services:
  postgresql:
    image: postgres:16
    container_name: postgres-axia
    restart: always
    environment:
      POSTGRES_PASSWORD: "4708"
      POSTGRES_USER: "marcoro"
      POSTGRES_DB: "sistemasD"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - axia-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-axia
    restart: always
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "marcorocadota@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "4708"
    depends_on:
      - postgresql
    networks:
      - axia-net

  nginx:
    image: nginx:latest
    container_name: nginx-axia
    restart: always
    ports:
      - "8081:80" # Usamos el 8081 para evitar el conflicto con pgAdmin
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist/mi-proyecto-angular:/usr/share/nginx/html:ro # Ruta a tu build de Angular
    depends_on:
      - postgresql
    networks:
      - axia-net

networks:
  axia-net:
    driver: bridge
